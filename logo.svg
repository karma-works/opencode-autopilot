  <g transform="translate(64 40)">
    <circle cx="80" cy="80" r="78" fill="#f7f3ea" stroke="#2dd4bf" stroke-width="4"/>
    <circle cx="80" cy="80" r="48" fill="none" stroke="#101418" stroke-width="10"/>
    <path d="M80 18 100 78 80 142 60 78Z" fill="#2563eb"/>
    <path d="M80 18 100 78 80 88 60 78Z" fill="#2dd4bf"/>
    <circle cx="80" cy="80" r="10" fill="#101418"/>
    <path d="M32 128 C82 164 133 162 181 118" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
    <path d="M181 118 160 116 170 137Z" fill="#f59e0b"/>
