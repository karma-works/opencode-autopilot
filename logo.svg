<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Autopilot</title>
  <desc id="desc">A compass and flight path logo for the OpenCode Autopilot project.</desc>
